<div class="page-container">
<app-simple-header></app-simple-header>
<div class="login-container">
    <div class="login-card">    
<h2>Library System</h2>
        <p class="subtitle">Iniciar sesión</p>
    <form [formGroup]="formulario" (ngSubmit)="login()">
      
         <div class="form-group">
            <label for="email">Correo</label>
            <input
            id="email"
            type="email"
            placeholder="correo@ejemplo.com"
            formControlName="email"
           />
           <div class="error" *ngIf="formulario.controls.email.touched && formulario.controls.email.invalid">
             <span *ngIf="formulario.controls.email.hasError('required')">
              El correo es obligatorio
            </span>
            <span *ngIf="formulario.controls.email.hasError('pattern')">
                El correo no es válido
            </span>
            </div>

        </div>


        <div class="form-group">
             <label for="password">Contraseña</label>
             <input
               id="password"
              type="password"
             formControlName="password"
            
            />
            <div class="error"
                *ngIf="
                formulario.controls.password.touched &&
                formulario.controls.password.invalid
                ">
               <span *ngIf="formulario.controls.password.hasError('required')">
                  La contraseña es obligatoria
                 </span>
                <span *ngIf="formulario.controls.password.hasError('minlength')">
                 Mínimo 8 caracteres
                </span>
            </div>
    </div>

    <div routerLink="/forgot-password">¿Olvidaste tu contraseña?</div>

    <button type="submit">Ingresar</button>
    <div>Si no tienes una cuenta 
      <a routerLink="/register">registrate</a></div>
      <p class="footer-text">
      Sistema de Biblioteca © 2025
    </p>
    </form>


    </div>
      
</div>

<app-footer></app-footer>
</div>
